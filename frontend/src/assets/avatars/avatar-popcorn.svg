      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0D0D0F"/>
    </linearGradient>
    <linearGradient id="bucket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF4D6A"/>
