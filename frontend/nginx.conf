# ── Configuration Nginx pour le frontend React ──
# Nginx fait trois choses :
# 1. Redirige tout le trafic HTTP (port 80) vers HTTPS (port 443)
# 2. Sert les fichiers statiques du frontend en HTTPS
# 3. Redirige les requêtes /api/ vers le backend Django (reverse proxy)

# ── Serveur HTTP → redirige vers HTTPS ──
# Quand quelqu'un tape http://filmmatching.com, il est automatiquement
# renvoyé vers https://filmmatching.com. Le code 301 = redirection permanente.
server {
    listen 80;
    server_name filmmatching.com www.filmmatching.com;
    return 301 https://$host$request_uri;
}

# ── Serveur HTTPS (le vrai serveur) ──
server {
    listen 443 ssl;
    server_name filmmatching.com www.filmmatching.com;

    # ── Certificats SSL (Let's Encrypt via Certbot) ──
    # Ces fichiers sont générés par Certbot et montés dans le conteneur
    # via un volume Docker (voir docker-compose.yml).
    ssl_certificate /etc/letsencrypt/live/filmmatching.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/filmmatching.com/privkey.pem;

    # ── Paramètres SSL recommandés pour la sécurité ──
    # TLSv1.2 et 1.3 uniquement (les anciennes versions ont des failles).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Emplacement des fichiers statiques du frontend (copiés depuis le build React).
    root /usr/share/nginx/html;
    index index.html;

    # ── Servir le frontend ──
    # try_files essaie de trouver le fichier demandé :
    # 1. $uri → le fichier exact (ex: /assets/style.css)
    # 2. $uri/ → un dossier avec un index.html
    # 3. /index.html → si rien trouvé, renvoie index.html
    #
    # Le point 3 est CRUCIAL pour une SPA (Single Page Application) React :
    # quand l'utilisateur va sur /home ou /friends, ces pages n'existent pas
    # en tant que fichiers. Nginx renvoie index.html et React Router
    # affiche la bonne page côté client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse proxy vers le backend Django ──
    # Toutes les requêtes qui commencent par /api/ sont redirigées vers Django.
    # Le frontend envoie ses requêtes à /api/..., Nginx les transmet à Django
    # qui tourne sur le port 8000 dans le conteneur "backend".
    location /api/ {
        # proxy_pass = redirige vers le service "backend" (nom du conteneur Docker).
        # Docker crée un réseau interne où les conteneurs se trouvent par leur nom.
        proxy_pass http://backend:8000;

        # Ces headers transmettent les infos du client original à Django.
        # Sans ça, Django verrait toutes les requêtes venir de Nginx, pas du vrai client.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Servir les fichiers statiques Django (admin, etc.) ──
    location /static/ {
        # Alias pointe vers le dossier staticfiles du backend (monté via Docker volume).
        alias /app/staticfiles/;
    }

    # ── Reverse proxy pour l'admin Django ──
    location /filmmatching-secret-admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
