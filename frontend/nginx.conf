# ── Configuration Nginx pour le frontend React ──
# Nginx fait trois choses :
# 1. Redirige tout le trafic HTTP (port 80) vers HTTPS (port 443)
# 2. Sert les fichiers statiques du frontend en HTTPS
# 3. Redirige les requêtes /api/ vers le backend Django (reverse proxy)

# ── Serveur HTTP → redirige vers HTTPS ──
# Quand quelqu'un tape http://filmmatching.com, il est automatiquement
# renvoyé vers https://filmmatching.com. Le code 301 = redirection permanente.
server {
    listen 80;
    server_name filmmatching.com www.filmmatching.com;
    return 301 https://$host$request_uri;
}

# ── Serveur HTTPS (le vrai serveur) ──
server {
    listen 443 ssl;
    server_name filmmatching.com www.filmmatching.com;

    # ── Certificats SSL (Let's Encrypt via Certbot) ──
    # Ces fichiers sont générés par Certbot et montés dans le conteneur
    # via un volume Docker (voir docker-compose.yml).
    ssl_certificate /etc/letsencrypt/live/filmmatching.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/filmmatching.com/privkey.pem;

    # ── Paramètres SSL recommandés pour la sécurité ──
    # TLSv1.2 et 1.3 uniquement (les anciennes versions ont des failles).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Emplacement des fichiers statiques du frontend (copiés depuis le build React).
    root /usr/share/nginx/html;
    index index.html;

    # ── Servir le frontend ──
    # try_files essaie de trouver le fichier demandé :
    # 1. $uri → le fichier exact (ex: /assets/style.css)
    # 2. $uri/ → un dossier avec un index.html
    # 3. /index.html → si rien trouvé, renvoie index.html
    #
    # Le point 3 est CRUCIAL pour une SPA (Single Page Application) React :
    # quand l'utilisateur va sur /home ou /friends, ces pages n'existent pas
    # en tant que fichiers. Nginx renvoie index.html et React Router
    # affiche la bonne page côté client.
    location / {
        try_files $uri $uri/ /index.html;

        # ── En-têtes de sécurité HTTP ──
        # Ces en-têtes durcissent le navigateur du visiteur. "always" = les
        # envoyer même sur les réponses d'erreur (4xx/5xx).
        # NB : ils sont posés ici (location /) car c'est Nginx qui sert le site
        # React. Les réponses /api/ et /admin/ sont gérées par Django, qui pose
        # ses propres en-têtes (on évite ainsi les doublons).

        # HSTS : force le navigateur à n'utiliser QUE HTTPS pour ce domaine.
        # Nginx est le 1er serveur contacté par le navigateur (il sert le site),
        # donc l'en-tête doit être posé ICI pour couvrir les pages du site.
        # 1 jour pour l'instant (prudent, comme côté Django) → passer à 31536000
        # (1 an) + "preload" quand le HTTPS est stable, EN MÊME TEMPS que Django.
        add_header Strict-Transport-Security "max-age=86400; includeSubDomains" always;

        # Interdit d'afficher le site dans une <iframe> d'un autre domaine (clickjacking).
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Empêche le navigateur de "deviner" le type d'un fichier (MIME sniffing).
        add_header X-Content-Type-Options "nosniff" always;

        # Limite les infos de provenance (URL) envoyées en partant vers un autre site.
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # CSP (Content-Security-Policy) : liste blanche des sources autorisées (anti-XSS).
        # ⚠️ À VÉRIFIER après le 1er déploiement : ouvrir la console du navigateur et
        # corriger les éventuelles "violations CSP", puis resserrer si possible.
        # Sources autorisées :
        #  - default-src 'self'           : par défaut, tout provient de notre domaine.
        #  - script-src 'self'            : JS uniquement depuis /assets (build Vite, aucun inline).
        #  - style-src ... 'unsafe-inline': React pose des styles en ligne (ex: transform du swipe).
        #  - img-src ... image.tmdb.org   : affiches des films ; data: pour les SVG/avatars inline.
        #  - font-src ... gstatic         : marge si on ajoute Google Fonts plus tard.
        #  - connect-src 'self'           : l'API passe par /api (même domaine via Nginx).
        #  - frame-src youtube            : lecteur de bande-annonce embarqué.
        #  - object-src 'none' / base-uri / form-action / frame-ancestors : durcissements standard.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https://image.tmdb.org; connect-src 'self'; frame-src https://www.youtube.com https://www.youtube-nocookie.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    }

    # ── Reverse proxy vers le backend Django ──
    # Toutes les requêtes qui commencent par /api/ sont redirigées vers Django.
    # Le frontend envoie ses requêtes à /api/..., Nginx les transmet à Django
    # qui tourne sur le port 8000 dans le conteneur "backend".
    location /api/ {
        # proxy_pass = redirige vers le service "backend" (nom du conteneur Docker).
        # Docker crée un réseau interne où les conteneurs se trouvent par leur nom.
        proxy_pass http://backend:8000;

        # Ces headers transmettent les infos du client original à Django.
        # Sans ça, Django verrait toutes les requêtes venir de Nginx, pas du vrai client.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Servir les fichiers statiques Django (admin, etc.) ──
    location /static/ {
        # Alias pointe vers le dossier staticfiles du backend (monté via Docker volume).
        alias /app/staticfiles/;
    }

    # ── Reverse proxy pour l'admin Django ──
    location /filmmatching-secret-admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
